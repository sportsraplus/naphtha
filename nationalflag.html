<h1>顔料・染料の推理</h1>

<div class="section">
<p>
 この５人が持ってきた顔料・染料の色は青、赤、緑、黄、白の５種類だと判明した。１人につき１色であり、重複はしていない。
</p>
<p>
  なお各人が持ってきた顔料・染料の色は自身の出身国の国旗に含まれる色である。
</p>
<p>
  例)国旗が赤と白の２色の場合、その人物が持ってきている顔料・染料の色は赤もしくは白である
</p>
<p>
 注意点)色覚多様性への配慮として、国旗は現実の色をグレースケールで表現した時の濃淡とは異なる場合があります。
</p>
<p>
 参考資料：<a href="https://www.asahi-net.or.jp/~yq3t-hruc/flag_J_ALL.html" target="_blank">世界の国旗一覧</a>
</p>
</div>
